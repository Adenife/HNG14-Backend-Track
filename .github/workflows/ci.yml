name: CI — Backend

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, stage3 ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: production
      DATABASE_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: testdb
      POSTGRES_HOST: localhost
      POSTGRES_HOSTNAME: localhost
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      GITHUB_REDIRECT_URI: http://localhost:8000/auth/github/callback
      JWT_SECRET_KEY: test-secret-key-for-ci-only-change-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 3
      REFRESH_TOKEN_EXPIRE_MINUTES: 5
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true # Non-blocking for now

      # - name: Run Alembic migrations
      #   run: uv run alembic upgrade head

      # In your GitHub Actions workflow
      - name: Check and Sync Database Migrations
        run: |
          # 1. Get the current database revision
          CURRENT=$(uv run alembic current 2>&1 | grep -oE '[a-f0-9]{12}' | head -1)
          
          # 2. Get the latest available revision (head)
          LATEST=$(uv run alembic heads 2>&1 | grep -oE '[a-f0-9]{12}' | head -1)

          echo "Current DB revision:  ${CURRENT:-'None/Empty'}"
          echo "Latest local revision: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "✅ Database is already at the latest version ($CURRENT). Skipping migration."
          else
            echo "🔄 Database is out of sync. Running migrations..."
            uv run alembic upgrade head
            echo "✅ Migration complete."
          fi

      - name: Run tests
        run: uv run pytest
